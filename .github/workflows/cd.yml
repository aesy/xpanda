---
name: Continuous Deployment

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false

  upload-artifact:
    name: Upload ${{ matrix.target }} artifact
    runs-on: ${{ matrix.os }}
    needs: release
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            path: ./target/x86_64-pc-windows-msvc/release/xpanda-cli.exe
            name: xpanda.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            path: ./target/x86_64-unknown-linux-gnu/release/xpanda-cli
            name: xpanda
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build project
        run: cargo build --release --target ${{ matrix.target }}
      - name: Prepare artifact
        shell: bash
        run: cp "${{ matrix.path }}" "${{ matrix.name }}"
      - name: Upload artifact
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}

  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        run: cargo publish --package xpanda --all-features --token ${{ secrets.CARGO_TOKEN }}
